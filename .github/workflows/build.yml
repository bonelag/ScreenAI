name: Build and Release
on:
  release:
    types: [published]

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust workspace
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App and Upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # Tự lấy tag khi release 
          releaseName: 'ScreenAI v__VERSION__'
          releaseBody: 'Phiên bản cài đặt ScreenAI dành cho Windows. Tải file .exe bên dưới để sử dụng.'
          releaseDraft: false
          prerelease: false
